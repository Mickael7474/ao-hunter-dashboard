formations:

  # ===================== IA GENERATIVE =====================
  - id: "IA-GEN-INDIV"
    titre: "Formation Individuelle IA Generative Personnalisee"
    categorie: "IA Generative"
    duree_heures: 7
    duree_jours: 1
    format: "2 demi-journees de 3h30"
    prerequis: "Aucun"
    public: "Professionnels souhaitant integrer les technologies d'IA generative dans leurs activites : entrepreneurs, experts en referencement, administrateurs, professionnels du marketing"
    objectifs:
      - "Comprendre les principes de base et le fonctionnement de l'IA generative"
      - "Utiliser l'IA generative pour creer du contenu (texte, image, audio, video)"
      - "Apprendre a formuler des consignes efficaces pour obtenir des resultats de qualite"
      - "Evaluer l'adequation et la pertinence des creations generees par l'IA"
      - "Integrer l'IA generative dans les processus de travail des entreprises"
      - "Gagner du temps dans toutes les taches : envoi de mail, creation de slides, transcription de reunions..."
    programme:
      - module: "Introduction a l'IA Generative"
        duree: "1 heure"
        contenu: "Exploration des differentes branches de l'IA generative : texte, image, audio et video. Analyse de cas d'utilisation inedits pour booster la productivite."
      - module: "IA Generative de Texte"
        duree: "4 heures"
        contenu: "Presentation de ChatGPT, Mistral, Gemini, Perplexity, Claude, Grok. Demonstrations en direct. Cas pratique : les participants creent leurs propres textes. Prompt Engineering, Creation de GPTs, Confidentialite et RGPD."
      - module: "IA Generative d'Image"
        duree: "30 minutes"
        contenu: "Exploration des outils tels que Midjourney, Dall-E, Stable Diffusion, Leonardo. Atelier pratique decouverte."
      - module: "IA Generative d'Audio"
        duree: "30 minutes"
        contenu: "Presentation des outils d'IA pour la creation audio. Atelier pratique : creation de clips audio."
      - module: "IA Generative de Video"
        duree: "30 minutes"
        contenu: "Introduction aux outils d'IA en video. Atelier pratique : realisation de courtes videos."
      - module: "Conclusion et Evaluation des Acquis"
        duree: "30 minutes"
        contenu: "Synthese des themes et outils abordes. Evaluation des acquis avec un questionnaire en ligne."
    inclus: "Un document avec 250 prompts pour l'IA Generative de texte et une feuille d'aide pour Midjourney"

  - id: "IA-GEN-DEEPSEEK"
    titre: "Deepseek, Qwen, Gemini - S'y retrouver au milieu des IA Generatives de Texte"
    categorie: "IA Generative"
    duree_heures: 7
    duree_jours: 1
    prerequis: "Connaissance de base des IA generatives. Une familiarite avec les API et l'automatisation est un plus."
    public: "Professionnels, developpeurs, data analysts, chefs de projet, consultants en IA, ou toute personne souhaitant comprendre et comparer les IA generatives de texte"
    objectifs:
      - "Comprendre les differences entre Deepseek, Qwen, Gemini et d'autres modeles"
      - "Apprendre a utiliser OpenRouter pour tester et comparer les modeles en appelant les APIs"
      - "Explorer les possibilites d'automatisation via Make"
      - "Decouvrir comment executer des modeles localement avec LM Studio et Ollama"
      - "Comprendre les enjeux de confidentialite et securite des donnees"
    programme:
      - module: "Introduction aux modeles Deepseek, Qwen et Gemini"
        duree: "1h"
        contenu: "Presentation des trois modeles, comparaison avec GPT-4, Mistral, Claude. IA open-source vs IA proprietaire."
      - module: "Experimentation des modeles via OpenRouter et API"
        duree: "1h30"
        contenu: "Introduction a OpenRouter. Comparaison des performances. Cas pratique : envoyer une meme requete a plusieurs modeles et comparer les reponses."
      - module: "Confidentialite et gestion des donnees"
        duree: "1h"
        contenu: "Quelles donnees sont enregistrees par ces modeles. Modeles heberges dans la VM vs execution en local."
      - module: "Automatisation avec Make"
        duree: "1h"
        contenu: "Presentation de Make pour automatiser les workflows IA. Exemples d'automatisation. Cas pratique."
      - module: "Faire tourner ses propres IA en local : LM Studio et Ollama"
        duree: "1h30"
        contenu: "Pourquoi executer un modele en local ? Outils apres installation de LM Studio. Cas pratique : tester un modele open-source en local."
      - module: "Comparatif final et recommandations d'usage"
        duree: "1h"
        contenu: "Synthese des performances et avantages de Deepseek, Qwen, Gemini. Quel modele pour quel besoin ?"

