<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AO Hunter{% endblock %} - Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <a href="{{ url_for('index') }}" class="nav-brand" style="text-decoration:none;color:inherit;">
            <span class="logo">AO</span> Hunter
        </a>
        <button class="hamburger" onclick="document.querySelector('.nav-links').classList.toggle('active')">&#9776;</button>
        <div class="nav-links">
            <a href="{{ url_for('index') }}" class="{% if request.endpoint == 'index' %}active{% endif %}">Dashboard</a>
            <a href="{{ url_for('liste_ao') }}" class="{% if request.endpoint == 'liste_ao' %}active{% endif %}">Appels d'offres</a>
            <a href="{{ url_for('kanban') }}" class="{% if request.endpoint == 'kanban' %}active{% endif %}">Kanban</a>
            <a href="{{ url_for('preinfos_view') }}" class="{% if request.endpoint == 'preinfos_view' %}active{% endif %}">Pre-infos</a>
            <a href="{{ url_for('liste_dossiers') }}" class="{% if request.endpoint == 'liste_dossiers' %}active{% endif %}">Dossiers</a>
            <a href="{{ url_for('page_brouillons') }}" class="{% if request.endpoint == 'page_brouillons' %}active{% endif %}">Brouillons</a>
            <a href="{{ url_for('autofill_page') }}" class="{% if request.endpoint == 'autofill_page' %}active{% endif %}">AutoFill</a>
            <a href="{{ url_for('roi') }}" class="{% if request.endpoint == 'roi' %}active{% endif %}">ROI</a>
            <a href="{{ url_for('page_statistiques') }}" class="{% if request.endpoint == 'page_statistiques' %}active{% endif %}">Statistiques</a>
            <a href="{{ url_for('objectifs_view') }}" class="{% if request.endpoint == 'objectifs_view' %}active{% endif %}">Objectifs</a>
            <a href="{{ url_for('crm_view') }}" class="{% if request.endpoint == 'crm_view' %}active{% endif %}">CRM</a>
        </div>
        <div class="nav-actions">
            <button id="darkModeToggle" class="btn-icon" title="Mode sombre">
                <span class="icon-sun">&#9728;</span>
                <span class="icon-moon" style="display:none;">&#9790;</span>
            </button>
        </div>
    </nav>

    <!-- Notification toast -->
    <div id="notifToast" class="notif-toast" style="display:none;"></div>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>AO Hunter - Almera &copy; 2026</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
    // --- Notifications push navigateur ---
    (function() {
        if (!('Notification' in window)) return;
        if (Notification.permission === 'default') {
            // Demander la permission apres une interaction
            document.addEventListener('click', function askNotif() {
                Notification.requestPermission();
                document.removeEventListener('click', askNotif);
            }, { once: true });
        }
        if (typeof io !== 'undefined') {
            try {
                var sock = io();
                sock.on('veille_complete', function(d) {
                    if (d.nouveaux > 0 && Notification.permission === 'granted') {
                        new Notification('AO Hunter - Nouveaux AO', {
                            body: d.nouveaux + ' nouvel(s) AO detecte(s)',
                            icon: '/static/favicon.ico',
                            tag: 'veille'
                        });
                    }
                    showToast(d.nouveaux + ' nouvel(s) AO detecte(s)', 'info');
                });
                sock.on('generation_complete', function(d) {
                    if (d.dossier && Notification.permission === 'granted') {
                        new Notification('AO Hunter - Dossier genere', {
                            body: 'Dossier pret : ' + (d.dossier || '').substring(0, 50),
                            icon: '/static/favicon.ico',
                            tag: 'generation'
                        });
                    }
                    showToast('Dossier genere : ' + (d.dossier || ''), 'success');
                });
                sock.on('pipeline_complete', function(d) {
                    if (d.generes > 0 && Notification.permission === 'granted') {
                        new Notification('AO Hunter - Pipeline auto', {
                            body: d.generes + ' dossier(s) genere(s), ' + d.brouillons + ' brouillon(s)',
                            icon: '/static/favicon.ico',
                            tag: 'pipeline'
                        });
                    }
                });
                sock.on('alertes_instantanees', function(d) {
                    if (Notification.permission === 'granted') {
                        new Notification('AO Hunter - Alerte AO', {
                            body: d.nb_alertes + ' AO a fort potentiel detecte(s) !',
                            icon: '/static/favicon.ico',
                            tag: 'alerte',
                            requireInteraction: true
                        });
                    }
                    showToast(d.nb_alertes + ' alerte(s) AO a fort potentiel !', 'warning');
                });
            } catch(e) {}
        }
        function showToast(msg, type) {
            var toast = document.getElementById('notifToast');
            if (!toast) return;
            toast.textContent = msg;
            toast.className = 'notif-toast notif-' + (type || 'info');
            toast.style.display = 'block';
            setTimeout(function() { toast.style.display = 'none'; }, 5000);
        }
    })();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
